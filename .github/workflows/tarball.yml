name: Build and Package

on:
  push:
    branches: [dev]

jobs:
  build-and-package:
    name: Build and Package All Plugins
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is recommended for Changesets to have full git history
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Configure Git for Changesets
        # This step is needed if 'changeset version' creates a commit
        # It configures the user that will be associated with the version bump commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Cache dependencies and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
            node_modules
          # Use bun.lockb for the key, as it's the source of truth for dependencies
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        # Use --frozen-lockfile for deterministic installs in CI
        run: bun install --frozen-lockfile

      # ------------------------------------------------------------------
      # The new, simplified core logic starts here.
      # This replaces the entire manual `for` loop for packaging.
      # ------------------------------------------------------------------

      - name: Version packages and create tarballs
        id: package
        run: |
          # This command does two things:
          # 1. `changeset version`: Bumps versions in package.json, updates changelogs,
          #    and crucially, replaces 'workspace:~' with actual version numbers.
          #    We use --snapshot to create a unique version for this CI build
          #    without consuming the changeset files.
          # 2. `bun run pack`: Runs `turbo run pack`, which in turn runs `bun pack`
          #    in each package, creating spec-compliant .tgz files.
          bunx changeset version --snapshot
          bun run pack

      - name: Collect all packaged tarballs
        run: bun run collect-packages

      - name: Upload all packages as a single artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-tgz
          path: artifacts/
          retention-days: 7

      - name: Install/Update GitHub CLI
        uses: crazy-max/ghaction-github-cli@v3
        with:
          version: latest

      # This section replaces the entire `publish-artifacts` job.
      # It creates individual artifacts for each package directly.
      - name: Upload individual packages
        # This step is optional but mirrors the functionality of your old `publish-artifacts` job.
        # It reads the contents of the artifacts directory and uploads each file individually.
        run: |
          cd artifacts
          for file in *.tgz; do
            echo "Uploading $file as an individual artifact..."
            gh artifact upload "$file" --name "$file" --repo ${{ github.repository }}
          done
        env:
          # The GITHUB_TOKEN is automatically provided by GitHub Actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
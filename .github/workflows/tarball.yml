name: Build and Package

on:
  push:
    branches: [dev]

jobs:
  build-and-package:
    name: Build and Package
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 2

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Package build artifacts
        run: |
          # 创建制品目录
          mkdir -p build-artifacts
          
          # 复制所有包的构建输出
          for dir in packages/*; do
            if [ -d "$dir" ]; then
              pkg=$(basename "$dir")
              mkdir -p "build-artifacts/$pkg"
              # 复制除src外的构建输出
              find "$dir" -mindepth 1 -maxdepth 1 -type d \( -name "lib" -o -name "dist" -o -name "resources" \) -exec cp -r {} "build-artifacts/$pkg/" \;
              # 复制package.json
              cp "$dir/package.json" "build-artifacts/$pkg/"
            fi
          done

          # 添加必要的配置文件
          cp package.json turbo.json build-artifacts/

      - name: Create downloadable archive
        run: |
          cd build-artifacts
          tar -czf ../build-artifacts.tar.gz .
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts.tar.gz

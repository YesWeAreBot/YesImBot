name: Build and Package

on:
  push:
    branches: [dev]

jobs:
  build-and-package:
    name: Build and Package
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 2

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Generate tarballs
        run: |
          mkdir -p tarballs
          
          # 为每个包创建单独的 tarball
          for dir in packages/*; do
            if [ -d "$dir" ]; then
              pkg=$(basename "$dir")
              echo "Packaging $pkg..."
              
              # 创建临时目录
              mkdir -p "temp/$pkg"
              
              # 复制构建输出
              find "$dir" -mindepth 1 -maxdepth 1 -type d \( -name "lib" -o -name "dist" -o -name "resources" \) -exec cp -r {} "temp/$pkg/" \;
              
              # 复制 package.json
              cp "$dir/package.json" "temp/$pkg/"
              
              # 创建 tarball
              tar -czf "tarballs/$pkg.tgz" -C "temp/$pkg" .
              
              # 清理临时目录
              rm -rf "temp/$pkg"
            fi
          done
          
          # 创建根配置 tarball
          cp package.json turbo.json temp/
          tar -czf tarballs/root-config.tgz -C temp package.json turbo.json
          rm -rf temp

      - name: Upload root config
        uses: actions/upload-artifact@v4
        with:
          name: root-config
          path: tarballs/root-config.tgz
          retention-days: 7

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: tarballs/${{ matrix.package }}.tgz
          retention-days: 7
        strategy:
          matrix:
            package: [
              "code-interpreter", 
              "code2image", 
              "core", 
              "favor", 
              "mcp", 
              "sticker-manager"
            ]

name: CI

on:
  pull_request:
    branches: [v4, dev]

jobs:
  check:
    name: Typecheck / Build / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn fmt:check
      - run: yarn typecheck
      - run: yarn build
      - run: yarn test

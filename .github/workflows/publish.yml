name: Publish

on:
  push:
    tags:
      - "core@*"
      - "search@*"
      - "shared-model@*"
      - "persona@*"
      - "provider-openai@*"
      - "provider-deepseek@*"
      - "provider-anthropic@*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - run: yarn install --immutable
      - run: yarn build

      - name: Resolve package path
        id: pkg
        run: |
          TAG="${{ github.ref_name }}"
          KEY="${TAG%@*}"
          case "$KEY" in
            core)               echo "path=core" >> $GITHUB_OUTPUT ;;
            shared-model)       echo "path=packages/shared-model" >> $GITHUB_OUTPUT ;;
            persona)            echo "path=plugins/persona" >> $GITHUB_OUTPUT ;;
            provider-openai)    echo "path=providers/provider-openai" >> $GITHUB_OUTPUT ;;
            provider-deepseek)  echo "path=providers/provider-deepseek" >> $GITHUB_OUTPUT ;;
            provider-anthropic) echo "path=providers/provider-anthropic" >> $GITHUB_OUTPUT ;;
            *)
              echo "Unknown tag key: $KEY"
              exit 1
              ;;
          esac

      - name: Publish
        run: |
          PKG_NAME=$(node -p "require('./${{ steps.pkg.outputs.path }}/package.json').name")
          yarn workspace "$PKG_NAME" npm publish --provenance
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

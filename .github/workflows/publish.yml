name: Publish

on:
  push:
    tags:
      - "core@*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - run: yarn install --immutable

      # 先构建依赖包
      - run: yarn build --filter=@yesimbot/shared-model
      # 发布 shared-model
      - name: Publish shared-model
        run: |
          yarn workspace @yesimbot/shared-model npm publish --provenance
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 等待 npm 注册表刷新
      - name: Wait for npm registry
        run: sleep 10

      # 构建并发布 core
      - run: yarn build --filter=koishi-plugin-yesimbot
      - name: Publish core
        run: |
          yarn workspace koishi-plugin-yesimbot npm publish --provenance
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
